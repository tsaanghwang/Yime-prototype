name: Documentation Check

on:
  push:
    paths:
      - 'docs/**'
      - '**/*.md'
      - '**/*.mdx'
  pull_request:
    branches: [ main ]
    paths:
      - 'docs/**'
      - '**/*.md'
      - '**/*.mdx'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect changed docs
        id: changed-docs
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            changed_files=$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" -- '*.md' '*.mdx' 'docs/**')
          else
            changed_files=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" -- '*.md' '*.mdx' 'docs/**')
          fi

          changed_files=$(printf '%s\n' "$changed_files" | sed '/^$/d')
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$changed_files" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          if [ -n "$changed_files" ]; then
            echo "has_docs=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_docs=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check Markdown formatting
        if: steps.changed-docs.outputs.has_docs == 'true'
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: ${{ steps.changed-docs.outputs.files }}

      - name: Set up Python
        if: steps.changed-docs.outputs.has_docs == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify Chinese punctuation
        if: steps.changed-docs.outputs.has_docs == 'true'
        run: python scripts/check_punctuation.py

      - name: Skip docs check when no docs changed
        if: steps.changed-docs.outputs.has_docs != 'true'
        run: echo "No Markdown or MDX files changed; skipping docs check."
